<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>index</title>
    <link rel="stylesheet" href="/staticGit/index.css">

<body>

    <h1>Welcome to our site</h1>

    <div class="forms-container">

            <input type="text" name="username" required placeholder="Enter username...">
            <input type="password" name="password" placeholder="Enter password...">
            <button type="submit">see information about myself</button>
        </form>

            <input type="text" name="username" required placeholder="Enter username...">
            
            <div class="subject-section">
                <h3>List of Subjects</h3>
                <div class="subject-grid">
                    <button type="submit" name="category" value="arts">arts</button>
                    <button type="submit" name="category" value="automobiles">automobiles</button>
                    <button type="submit" name="category" value="books">books</button>
                    <button type="submit" name="category" value="business">business</button>
                    <button type="submit" name="category" value="fashion">fashion</button>
                    <button type="submit" name="category" value="food">food</button>
                    <button type="submit" name="category" value="health">health</button>
                    <button type="submit" name="category" value="home">home</button>
                    <button type="submit" name="category" value="insider">insider</button>
                    <button type="submit" name="category" value="magazine">magazine</button>
                    <button type="submit" name="category" value="movies">movies</button>
                    <button type="submit" name="category" value="nyregion">ny region</button>
                    <button type="submit" name="category" value="obituaries">obituaries</button>
                    <button type="submit" name="category" value="opinion">opinion</button>
                    <button type="submit" name="category" value="politics">politics</button>
                    <button type="submit" name="category" value="realestate">real estate</button>
                    <button type="submit" name="category" value="science">science</button>
                    <button type="submit" name="category" value="sports">sports</button>
                    <button type="submit" name="category" value="sundayreview">sunday review</button>
                    <button type="submit" name="category" value="technology">technology</button>
                    <button type="submit" name="category" value="theater">theater</button>
                    <button type="submit" name="category" value="t-magazine">t-magazine</button>
                    <button type="submit" name="category" value="travel">travel</button>
                    <button type="submit" name="category" value="upshot">upshot</button>
                    <button type="submit" name="category" value="us">us news</button>
                    <button type="submit" name="category" value="world">world news</button>
                </div>
            </div>
        </form>
        
    </div>
</body>
</html>
