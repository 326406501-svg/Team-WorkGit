<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search History for {{username}}</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <link rel="stylesheet" href="/staticGit/best_intersects.css">
</head>
<body>

    <div class="welcome-header">
        <div class="user-badge">
            <i data-lucide="history"></i>
            <span>Search Analytics</span>
        </div>
        <h1>Hello, <span>{{username}}</span></h1>
        <h2><i data-lucide="calendar"></i> This is your history of searching:</h2>
    </div>

    <div class="history-container">
        {% for topic, data in user_profile.items() %}
        <div class="history-card">
            <div class="history-card-header">
                <h3><i data-lucide="search"></i> {{topic}}</h3>
                <div class="stats-badge">
                    <i data-lucide="clock"></i>
                    <span>Total: {{data["total time of search"]}}</span>
                </div>
            </div>

            <div class="timeline-section">
                <h4><i data-lucide="list"></i> Dates of Search:</h4>
                <div class="timeline-list">
                    {% for date in data["date_of_search"] %}
                    <div class="timeline-item">
                        <span class="timeline-dot"></span>
                        <span class="timeline-date">{{date}}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
